<div class="p-6 max-w-lg mx-auto bg-white shadow-lg rounded-lg mt-6">
    <h2 class="text-2xl font-semibold text-gray-700 mb-4">Novo Lugar</h2>
    <hr />

    <form id="lugarForm" [formGroup]="camposForm" (ngSubmit)="salvar()">
        <div class="mb-4">
            <label for="nome" class="block text-gray-600 font-medium mb-2">Nome do Lugar</label>
            <input class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400"
                type="text" id="nome" name="nome" formControlName="nome" placeholder="Praia do Sol" />
        </div>

        <div class="mb-4">
            <label for="nome" class="block text-gray-600 font-medium mb-2">Categoria</label>
            <input class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400"
                type="text" id="nome" name="nome" formControlName="nome" placeholder="Praia do Sol" />
        </div>

        <div class="mb-4">
            <label for="localizacao" class="block text-gray-600 font-medium mb-2">Localização</label>
            <input class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400"
                type="text" id="localizacao" name="localizacao" formControlName="localizacao" placeholder="São Paulo" />
        </div>

        <div class="mb-4">
            <label for="urlFoto" class="block text-gray-600 font-medium mb-2">URL Foto</label>
            <input class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400"
                type="text" id="urlFoto" name="urlFoto" formControlName="urlFoto" placeholder="http://exemplo.com/foto.jgp" />
        </div>

        <div class="mb-4">
            <label for="nome" class="block text-gray-600 font-medium mb-2">Nome do Lugar</label>
            <input class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400"
                type="text" id="nome" name="nome" formControlName="nome" placeholder="Praia do Sol" />
        </div>


        <button type="submit" class="w-full bg-blue-600 text-white rounded font-semibold p-3 shadow hover:bg-blue-900 cursor-pointer
                transition-color duration-300
            ">Cadastrar Lugar</button>
    </form>
</div>
