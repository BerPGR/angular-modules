<div class="p-6 max-w-lg mx-auto bg-white shadow-lg rounded-lg mt-6">
    <h2 class="text-2xl font-semibold text-gray-700 mb-4">Novo Lugar</h2>
    <hr />

    <form id="lugarForm" [formGroup]="" (ngSubmit)="salvar()">


        <button type="submit" class="w-full bg-blue-600 text-white rounded font-semibold p-3 shadow hover:bg-blue-900 cursor-pointer

            ">Cadastrar Lugar</button>
    </form>
</div>
