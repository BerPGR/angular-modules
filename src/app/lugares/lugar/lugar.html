<div class="p-6 max-w-lg mx-auto bg-white shadow-lg rounded-lg mt-6">
    <h2 class="text-2xl font-semibold text-gray-700 mb-4">Novo Lugar</h2>
    <hr />

    <form id="lugarForm" [formGroup]="camposForm" (ngSubmit)="salvar()">
        <div class="mb-4">
            <label for="nome" class="block text-gray-600 font-medium mb-2">Nome do Lugar</label>
            <input class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400"
                type="text" id="nome" name="nome" formControlName="nome" placeholder="Praia do Sol" />
            <span *ngIf="isFieldInvalid('nome')" class="text-red-500 text-sm">Campo Obrigatório</span>

        </div>

        <div class="mb-4">
            <label for="categoria" class="block text-gray-600 font-medium mb-2">Categoria</label>
            <select id="categoria" name="categoria" formControlName="categoria"
                class="w-full p-3 border border-gray-300 rounded shadow-sm focus:outline-none focus:ring-blue-400">
                <option [value]="" disabled>Selecione uma categoria</option>
                <option *ngFor="let categoria of categorias" [value]="categoria.nome">{{categoria.nome}}</option>
            </select>
            <span *ngIf="isFieldInvalid('categoria')" class="text-red-500 text-sm">Campo Obrigatório</span>
        </div>

        <div class="mb-4">
            <label for="localizacao" class="block text-gray-600 font-medium mb-2">Localização</label>
            <input class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400"
                type="text" id="localizacao" name="localizacao" formControlName="localizacao" placeholder="São Paulo" />
            <span *ngIf="isFieldInvalid('localizacao')" class="text-red-500 text-sm">Campo Obrigatório</span>
        </div>

        <div class="mb-4">
            <label for="urlFoto" class="block text-gray-600 font-medium mb-2">URL Foto</label>
            <input class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400"
                type="text" id="urlFoto" name="urlFoto" formControlName="urlFoto"
                placeholder="http://exemplo.com/foto.jgp" />
            <span *ngIf="isFieldInvalid('urlFoto')" class="text-red-500 text-sm">Campo Obrigatório</span>
        </div>

        <div class="mb-4">
            <label for="avaliacao" class="block text-gray-600 font-medium mb-2">Avaliação</label>
            <select id="avaliacao" name="avaliacao" formControlName="avaliacao"
                class="w-full p-3 border border-gray-300 rounded shadow-sm focus:outline-none focus:ring-blue-400">
                <option [value]="" disabled>Selecione uma avaliação</option>
                <option [value]="1">1 - Ruim</option>
                <option [value]="2">2 - Regular</option>
                <option [value]="3">3 - Bom</option>
                <option [value]="4">4 - Muito bom</option>
                <option [value]="5">5 - Excelente</option>
            </select>
            <span *ngIf="isFieldInvalid('avaliacao')" class="text-red-500 text-sm">Campo Obrigatório</span>
        </div>


        <button type="submit" class="w-full bg-blue-600 text-white rounded font-semibold p-3 shadow hover:bg-blue-900 cursor-pointer
                transition-color duration-300
            ">Cadastrar Lugar</button>
    </form>
</div>
